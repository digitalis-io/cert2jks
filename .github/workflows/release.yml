name: Release
on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    shell: bash

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9].* ]]; then
            echo "Invalid tag format: $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Set repo owner (lowercase)
        run: echo "REPO_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ env.REPO_OWNER }}

  darwin:
    name: Darwin Build
    needs: goreleaser
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Build darwin binaries
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VER="${VERSION#v}"
          LDFLAGS="-s -w -X main.version=${VER} -X main.commit=${COMMIT} -X main.date=${DATE}"
          mkdir -p dist

          build_one() {
            local arch="$1" archname="$2" cc_arch="$3"
            local outdir="dist/cert2jks_${VER}_Darwin_${archname}"
            mkdir -p "${outdir}"
            CGO_ENABLED=1 GOOS=darwin GOARCH="${arch}" \
              CC="clang -arch ${cc_arch}" CXX="clang++ -arch ${cc_arch}" \
              go build -trimpath -ldflags "${LDFLAGS}" -o "${outdir}/cert2jks" ./main.go
            cp README.md "${outdir}/"
            cp LICENSE* "${outdir}/" 2>/dev/null || true
            cp -R resources "${outdir}/"
            tar -C dist -czf "${outdir}.tar.gz" "$(basename "${outdir}")"
          }

          build_one amd64 x86_64 x86_64
          build_one arm64 arm64  arm64

          ( cd dist && shasum -a 256 *.tar.gz > darwin_checksums.txt )

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/cert2jks_*_Darwin_*.tar.gz \
            dist/darwin_checksums.txt \
            --clobber
