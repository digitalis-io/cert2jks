version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
    - gosec
    - bodyclose
    - unconvert
    - unparam
    - prealloc
  settings:
    gosec:
      excludes:
        - G104
        - G204
        - G304
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - unparam

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
