run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gofmt
    - goimports
    - misspell
    - revive
    - gocritic
    - gosec
    - bodyclose
    - unconvert
    - unparam
    - prealloc

linters-settings:
  gosec:
    excludes:
      - G104  # errors unhandled (covered by errcheck)
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - unparam
  max-issues-per-linter: 0
  max-same-issues: 0
